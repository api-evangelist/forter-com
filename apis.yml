aid: forter-com
name: Forter
description: >-
  Forter is a New York City-headquartered ecommerce fraud prevention and
  digital identity platform founded in 2013 by Michael Reitblat and Alon
  Shemesh. The company operates an AI-powered decision platform for digital
  commerce that helps merchants approve more legitimate transactions while
  blocking fraud, account takeover, payment abuse, policy abuse, and
  return/refund abuse. Forter's products include Fraud Management, Payment
  Optimization (3DS, card vaulting, network uplift, payment orchestration,
  predictive routing), Dispute / Chargeback Recovery, Account Protection
  (sign-up, login, session), Abuse Prevention (checkout and post-purchase),
  Element for Payment Service Providers, and an Agentic Commerce suite for
  AI-agent-initiated transactions. The platform is built on what Forter
  describes as the world's largest first-party identity network, derived
  from real consumer interactions across hundreds of leading retailers,
  marketplaces, and food-delivery brands such as Adidas, eBay, Instacart,
  Nordstrom, Priceline, Sephora, and Wayfair. Forter exposes a public Core
  API (orders, 3DS, disputes, accounts, merchants, compensation, data
  privacy) and an Evidence API documented at docs.forter.com, alongside
  prebuilt integrations for Magento/Adobe Commerce, Salesforce B2C
  Commerce, commercetools, Adyen, Braintree, Checkout.com, Paysafe,
  Worldline, Worldpay, and others. Forter is also the sponsor of the
  open-source Trusted Agentic Commerce Protocol, a secure authentication
  and data-encryption protocol for AI agents, merchants, and merchant
  vendors. The company has raised approximately $525M in venture funding
  from Sequoia Capital, Bessemer Venture Partners, NEA, and others, and
  has been valued at roughly $3B at last public reporting.
